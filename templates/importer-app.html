<form class="ftstods-importer">
  <div class="form-group">
    <label>Forged Steel .ds File</label>
    <input type="file" name="ds-file" accept=".ds-hero" />
  </div>

  <div class="form-group">
    <label>Dry Run (don’t create Actor)</label>
    <input type="checkbox" name="dry-run" />
  </div>

  <footer class="sheet-footer flexrow">
    <button type="submit" class="dialog-button default">
      <i class="fas fa-file-import"></i> Import
    </button>
  </footer>
</form>
